services:
  mongodb:
    image: mongodb/mongodb-community-server:latest
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mongo_data:/finance_dashboard/main/data/db
  
  backend:
    build: ./backend
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "0.0.0.0:3000:3000"
    env_file: ./backend/.env

  frontend:
    build: ./frontend
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "0.0.0.0:5173:5173"
  
  
volumes:
  mongo_data:
  