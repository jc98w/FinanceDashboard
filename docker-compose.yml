version: '3'
services:
  mongodb:
    image: mongodb/mongodb-community-server:latest
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  fastify-server:
    build: .
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/finance

volumes:
  mongo-data: