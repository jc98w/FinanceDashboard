services:
  mongodb:
    volumes: !override
      - mongo_data:/finance_dashboard/staging/data/db
  
  backend:
    build:
      target: development
    ports: !override
      - "3001:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npx nodemon -L --exec "fastify start -l info ./app.js"

  frontend:
    ports: !override
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_PORT:5173